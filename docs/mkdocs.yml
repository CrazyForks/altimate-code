site_name: altimate-code
site_description: The open-source data engineering harness. 99+ tools for building, validating, optimizing, and shipping data products.
site_url: https://docs.altimate.sh
repo_url: https://github.com/AltimateAI/altimate-code
repo_name: AltimateAI/altimate-code

copyright: "&copy; 2026 Altimate Inc. All rights reserved."

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.png
  favicon: assets/images/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
    - content.tooltips

extra_css:
  - assets/css/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AltimateAI/altimate-code
    - icon: fontawesome/brands/discord
      link: https://altimate.ai/discord
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/altimate-engine/
  analytics:
    provider: google
    property: G-C89Y5E4JJT
  consent:
    title: Cookie consent
    description: >-
      We use cookies to measure usage and improve the documentation.

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
